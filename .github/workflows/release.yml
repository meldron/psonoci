name: Release
on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc*"
      - "release-test"

permissions:
  contents: write

jobs:
  create-release:
    name: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
          gh release create "$RELEASE_TAG" --title "Release $RELEASE_TAG"

  build-release:
    name: build-release
    needs: ["create-release"]
    runs-on: ${{ matrix.os }}
    env:
      builder_image: meldron/psonoci_builder
      RELEASE_VERSION: ${{ github.ref_name }}
    strategy:
      matrix:
        build: [linux, linux-armv7, linux-aarch64, macos, win-gnu, win-msvc]
        include:
          - build: linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            target_type: unix
            use_cross: true
          - build: linux-armv7
            os: ubuntu-22.04
            target: armv7-unknown-linux-gnueabihf
            target_type: unix
            use_cross: true
          - build: linux-armv7-musl
            os: ubuntu-22.04
            target: armv7-unknown-linux-musleabihf
            target_type: unix
            use_cross: true
          - build: linux-aarch64
            os: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            target_type: unix
            use_cross: true
          - build: macos
            os: macos-latest
            target: x86_64-apple-darwin
            target_type: unix
            use_cross: false
          - build: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            target_type: unix
            use_cross: false
          - build: win-gnu
            os: windows-latest
            target: x86_64-pc-windows-gnu
            target_type: windows
            use_cross: false
          - build: win-msvc
            os: windows-latest
            target: x86_64-pc-windows-msvc
            target_type: windows
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: install rust
        # Keep this pinned to the repository toolchain in rust-toolchain.toml.
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Pull docker image used by cross
        if: matrix.os == 'ubuntu-22.04'
        run: docker pull $builder_image:${{ matrix.target }}

      # - name: Build docker image used by cross
      #   if: matrix.target != 'x86_64-pc-windows-gnu'
      #   run: docker build build_files --cache-from $builder_image:${{ matrix.target }} --file build_files/Dockerfile-${{ matrix.target }} --tag $builder_image:${{ matrix.target }}

      - name: build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v3
        with:
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PRIVATE_KEY_PASSPHRASE }}

      - name: Build archive
        shell: bash
        run: |
          staging="psonoci-${{ env.RELEASE_VERSION }}-${{ matrix.target }}"
          mkdir -p "$staging"
          if [ "${{ matrix.target_type }}" = "windows" ]; then
            cp "target/${{ matrix.target }}/release/psonoci.exe" "$staging/"
            7z a "$staging.zip" "$staging"
            gpg --armor --detach-sig -u psonoci@dfjk.eu "$staging.zip"
            echo "ASSET=$staging.zip" >> $GITHUB_ENV
            echo "ASSET_SIG=$staging.zip.asc" >> $GITHUB_ENV
          else
            cp "target/${{ matrix.target }}/release/psonoci" "$staging/"
            tar czf "$staging.tar.gz" "$staging"
            gpg --armor --detach-sig -u psonoci@dfjk.eu "$staging.tar.gz"
            echo "ASSET=$staging.tar.gz" >> $GITHUB_ENV
            echo "ASSET_SIG=$staging.tar.gz.asc" >> $GITHUB_ENV
          fi

      - name: Upload release archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ env.ASSET }}" --clobber

      - name: Upload release archive signature
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ env.ASSET_SIG }}" --clobber
